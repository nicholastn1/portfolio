<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 56" width="720" height="112" role="img" aria-label="Nicholas Nogueira">
  <title>Nicholas Nogueira</title>

  <!-- NN monogram block (uses the same construction as the favicon, scaled to 56×56) -->
  <svg x="0" y="0" width="56" height="56" viewBox="0 0 64 64">
    <rect width="64" height="64" fill="#161512"/>
    <g fill="#F2F0EA">
      <rect x="13" y="18" width="5" height="28"/>
      <polygon points="13,18 18,18 30,46 25,46"/>
      <rect x="25" y="18" width="5" height="28"/>
      <rect x="34" y="18" width="5" height="28"/>
      <polygon points="34,18 39,18 51,46 46,46"/>
      <rect x="46" y="18" width="5" height="28"/>
    </g>
  </svg>

  <!-- Wordmark -->
  <text
    x="74" y="38"
    font-family="'Bricolage Grotesque', ui-sans-serif, system-ui, sans-serif"
    font-size="28"
    font-weight="600"
    letter-spacing="-0.6"
    fill="#161512"
  >Nicholas Nogueira</text>
</svg>
