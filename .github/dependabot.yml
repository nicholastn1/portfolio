version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      rails-stack:
        patterns:
          - "rails"
          - "actionview"
          - "actionpack"
          - "actioncable"
          - "actionmailer"
          - "actionmailbox"
          - "actiontext"
          - "activerecord"
          - "activemodel"
          - "activejob"
          - "activestorage"
          - "activesupport"
          - "railties"
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    labels:
      - dependencies
      - ruby

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        update-types:
          - "minor"
          - "patch"
    labels:
      - dependencies
      - github-actions
